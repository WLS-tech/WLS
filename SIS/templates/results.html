<main>



<header>

<h1>
Student Results
</h1>


<p>
View semester examination results.
</p>


</header>







<section>


<h2>
Search Result
</h2>



<input

type="text"

id="searchResult"

placeholder="Enter Student ID">



<select id="semester">

<option>
Term 1
</option>


<option>
Term 2
</option>


<option>
Term 3
</option>


</select>



<button type="button" id="searchBtn">
Search
</button>



</section>







<section>


<h2>
Results
</h2>



<table border="1" id="resultsTable">



<thead>


<tr>

<th>
Subject
</th>


<th>
Grade
</th>


<th>
Remark
</th>


</tr>


</thead>




<tbody id="resultsBody">


</tbody>




</table>



</section>
