<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Information System | Register</title>


    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    


</head>



<body>


<header>

    <h1>Student Registration</h1>

    <p>Create your account (pending verification)</p>

</header>




<main>


<div class="login-container">


<section class="login-card">


<h2>Create Account</h2>



<form id="registerForm">



<label for="fullname">
Full Name
</label>

<input
type="text"
id="fullname"
name="fullname"
placeholder="Enter full name"
required>



<br><br>



<label for="studentid">
Student ID
</label>

<input
type="text"
id="studentid"
name="studentid"
placeholder="Enter student ID"
required>



<br><br>



<label for="phone">
Phone Number
</label>

<input
type="tel"
id="phone"
name="phone"
placeholder="Enter phone number"
required>



<br><br>



<label for="email">
Email
</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter email"
required>



<br><br>



<label for="department">
Department
</label>

<input
type="text"
id="department"
name="department"
placeholder="Enter department"
required>



<br><br>



<label for="password">
Password
</label>

<input
type="password"
id="password"
name="password"
placeholder="Create password"
required>



<br><br>



<label for="confirmPassword">
Confirm Password
</label>

<input
type="password"
id="confirmPassword"
name="confirmPassword"
placeholder="Confirm password"
required>



<br><br>



<button type="submit">

Register

</button>



</form>





<p>

Already have an account?

<a href="{{ url_for('login_page') }}">
Login
</a>


</p>



</section>


</div>


</main>





<footer>

<p>
© 2026 Student Information System
</p>

</footer>




<script src="{{ url_for('static', filename='js/register.js') }}"></script>


</body>

</html>
