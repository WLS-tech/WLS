<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Information System | Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>


<body>


<header>

    <h1>WLS Student Information System</h1>

    <p>
        Welcome back! Please log in to continue.
    </p>

</header>



<main>

<div class="login-container">

<section class="login-card">

    <h2>Login to WLS SIS</h2>


    <form id="loginForm">


        <div>

            <label for="phone">
                Phone Number
            </label>

            <br>


            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Enter your phone number"
                required>

        </div>



        <br>



        <div>

            <label for="password">
                Password
            </label>

            <br>


            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required>

        </div>



        <br>



        <div>

            <input
                type="checkbox"
                id="remember">


            <label for="remember">
                Remember Me
            </label>

        </div>



        <br>



        <button type="submit">
            Login
        </button>


    </form>



    <br>



    <a href="#">
        Forgot Password?
    </a>



    <br><br>



    <p>

        Don't have an account?

        <a href="{{ url_for('register_page') }}">
            Register
        </a>

    </p>


</section>


</div>

</main>




<footer>

    <p>
        © 2026 Student Information System
    </p>

</footer>



<script src="{{ url_for('static', filename='js/login.js') }}"></script>


</body>

</html>
